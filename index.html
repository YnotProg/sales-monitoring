<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sales Monitoring System - Cloud Sync</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            overflow: hidden;
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: #16213e;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid #0f3460;
        }

        .login-box h2 {
            color: #0ff;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0f3460;
            border: 1px solid #1a1a2e;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #00b894;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .login-box button:hover { opacity: 0.9; }
        .login-box .exit-btn { background: #d63031; margin-top: 5px; }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .tab-bar {
            display: flex;
            background: #0f3460;
            padding: 0 10px;
            gap: 5px;
            overflow-x: auto;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 20px;
            background: #16213e;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            border-radius: 8px 8px 0 0;
            font-size: 13px;
        }

        .tab-btn.active {
            background: #1a1a2e;
            color: #0ff;
            border-bottom: 3px solid #0ff;
        }

        .tab-btn:hover { background: #1f3a5f; color: white; }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #1a1a2e;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        .card {
            background: #16213e;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #0f3460;
        }

        .card h3 {
            color: #0ff;
            margin-bottom: 15px;
            font-size: 16px;
            border-left: 3px solid #0ff;
            padding-left: 10px;
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .form-row label {
            min-width: 80px;
            font-size: 13px;
            color: #aaa;
        }

        input, select, button {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #0f3460;
            background: #0f3460;
            color: white;
            font-size: 13px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #0ff;
        }

        button {
            background: #0f3460;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #1f3a5f;
            transform: translateY(-1px);
        }

        button.primary { background: #00b894; }
        button.primary:hover { background: #00a884; }
        button.danger { background: #d63031; }
        button.warning { background: #f39c12; }
        button.info { background: #3498db; }
        button.success { background: #27ae60; }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .data-table th, .data-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #0f3460;
        }

        .data-table th {
            background: #0f3460;
            color: #ff0;
            font-weight: bold;
            position: sticky;
            top: 0;
        }

        .data-table tr:hover { background: #1f3a5f; }

        .table-container {
            max-height: 300px;
            overflow-y: auto;
        }

        .summary-bar {
            background: #0f3460;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            border-top: 1px solid #1f3a5f;
            flex-wrap: wrap;
            gap: 10px;
        }

        .summary-text {
            flex: 1;
            font-weight: bold;
        }

        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .popup-box {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            min-width: 300px;
            max-width: 500px;
            text-align: center;
            border: 1px solid #0ff;
        }

        .popup-box input, .popup-box textarea {
            width: 100%;
            margin: 10px 0;
        }

        .popup-box textarea {
            background: #0f3460;
            border: 1px solid #0f3460;
            border-radius: 6px;
            color: white;
            padding: 8px;
            font-family: monospace;
            font-size: 11px;
        }

        .popup-box button {
            margin: 5px;
            padding: 8px 20px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .modal-content {
            background: #16213e;
            padding: 25px;
            border-radius: 15px;
            width: 350px;
            border: 2px solid #0ff;
        }

        .modal-content h3 {
            color: #0ff;
            margin-bottom: 15px;
        }

        .modal-content input {
            width: 100%;
            margin: 10px 0;
        }

        .positive { color: #00ff88; }
        .negative { color: #ff6b6b; }
        .today-badge { color: #00ff88; font-weight: bold; }
        .other-date { color: #f39c12; }

        .denom-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 20px;
            background: #0f3460;
            padding: 15px;
            border-radius: 10px;
        }
        .denom-item {
            text-align: center;
            background: #16213e;
            padding: 10px;
            border-radius: 8px;
        }
        .denom-item label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
            color: #0ff;
        }
        .denom-item input {
            width: 100%;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            padding: 10px;
        }

        .inline-add {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        
        .inline-add button {
            padding: 8px 12px;
            white-space: nowrap;
        }

        .db-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .stat-card {
            background: #0f3460;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-card .number {
            font-size: 24px;
            font-weight: bold;
            color: #0ff;
        }
        
        .stat-card .label {
            font-size: 11px;
            color: #aaa;
            margin-top: 5px;
        }
        
        .db-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .file-input-label {
            background: #3498db;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            display: inline-block;
        }
        
        .file-input-label:hover {
            background: #2980b9;
        }
        
        input[type="file"] {
            display: none;
        }

        input[type="date"] {
            background: #0f3460;
            color: white;
            border: 1px solid #0f3460;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 6px;
        }
        
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .date-header {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #0f3460;
        }
        
        .date-header h3 {
            margin: 0;
        }
        
        .date-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: #0f3460;
        }
        
        .date-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-note {
            background: #0f3460;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            margin-top: 10px;
            border-left: 3px solid #f39c12;
        }

        .collection-summary {
            background: #0f3460;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .collection-summary div {
            margin: 5px 0;
        }

        .badge-customer {
            background: #3498db;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            display: inline-block;
        }
        
        .badge-salesman {
            background: #f39c12;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            display: inline-block;
        }

        .sync-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .sync-online { background-color: #00ff88; box-shadow: 0 0 5px #00ff88; }
        .sync-offline { background-color: #ff6b6b; }
        .sync-syncing { background-color: #f39c12; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        @media (max-width: 768px) {
            .denom-grid { grid-template-columns: repeat(3, 1fr); }
            .tab-btn { padding: 8px 12px; font-size: 11px; }
            .form-row label { min-width: 70px; font-size: 11px; }
            input, select, button { font-size: 11px; padding: 6px 8px; }
            .inline-add button { padding: 6px 8px; }
            .db-stats-grid { grid-template-columns: repeat(2, 1fr); }
            .date-header { flex-direction: column; align-items: flex-start; }
        }
    </style>

    function getToday() { return new Date().toISOString().split('T')[0]; }
    function getTimestamp() { return new Date().toISOString().replace('T', ' ').slice(0, 19); }
    function loadData(key) { const data = localStorage.getItem(key); return data ? JSON.parse(data) : []; }
    function saveData(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
    
    // ============= MARKETS & CUSTOMERS MANAGEMENT =============
    function loadMarketsCustomers() {
        const saved = localStorage.getItem(STORAGE_KEYS.MARKETS_CUSTOMERS);
        if (saved) return JSON.parse(saved);
        saveData(STORAGE_KEYS.MARKETS_CUSTOMERS, defaultMarketsCustomers);
        return { ...defaultMarketsCustomers };
    }
    
    function saveMarketsCustomers(data) { saveData(STORAGE_KEYS.MARKETS_CUSTOMERS, data); }
    
    function addNewMarket(marketName) {
        const markets = loadMarketsCustomers();
        if (!markets[marketName]) {
            markets[marketName] = [];
            saveMarketsCustomers(markets);
            return true;
        }
        return false;
    }
    
    function addNewCustomer(marketName, customerName) {
        const markets = loadMarketsCustomers();
        if (markets[marketName] && !markets[marketName].includes(customerName)) {
            markets[marketName].push(customerName);
            saveMarketsCustomers(markets);
            return true;
        }
        return false;
    }
    
    function getAllMarkets() {
        return Object.keys(loadMarketsCustomers());
    }
    
    function getCustomers(marketName) {
        return loadMarketsCustomers()[marketName] || [];
    }
    
    // ============= APP GLOBAL STATE =============
    let currentUser = null;
    let userRole = null;
    let currentDate = getToday();
    let currentSalesman = 'Jay';
    let editingSaleId = -1;
    let reportType = 'daily';
    let reportDate = getToday();
    let reportMonth = new Date().getMonth();
    let reportYear = new Date().getFullYear();
    
    // ============= HELPER FUNCTIONS =============
    function showMessage(title, message, isError = false, duration = 3000) {
        const popup = document.createElement('div');
        popup.className = 'popup-overlay';
        popup.innerHTML = `<div class="popup-box"><h3 style="color: ${isError ? '#ff6b6b' : '#0ff'}">${title}</h3><p style="white-space: pre-line;">${message}</p><button onclick="this.closest('.popup-overlay').remove()">OK</button></div>`;
        document.body.appendChild(popup);
        setTimeout(() => { if (popup.parentNode) popup.remove(); }, duration);
    }
    
    function isToday(dateString) { return dateString === getToday(); }
    
    async function onDateChange() {
        const dateInput = document.getElementById('global-date-picker');
        if (dateInput && dateInput.value) {
            currentDate = dateInput.value;
            reportDate = currentDate;
            await updateAllDateDisplays();
            await refreshAll();
            await generateReport();
            showMessage('Date Changed', `Now viewing data for: ${currentDate}${isToday(currentDate) ? ' (TODAY)' : ''}`);
        }
    }
    
    async function updateAllDateDisplays() {
        const datePicker = document.getElementById('global-date-picker');
        if (datePicker) datePicker.value = currentDate;
        const reportDatePicker = document.getElementById('report-date');
        if (reportDatePicker) reportDatePicker.value = currentDate;
        const dateDisplays = document.querySelectorAll('.current-date-display');
        dateDisplays.forEach(display => { display.textContent = currentDate; });
        const badges = document.querySelectorAll('.date-badge');
        badges.forEach(badge => {
            if (isToday(currentDate)) {
                badge.innerHTML = '✅ TODAY';
                badge.className = 'date-badge today-badge';
            } else {
                badge.innerHTML = '📅 VIEWING: ' + currentDate;
                badge.className = 'date-badge other-date';
            }
        });
    }
    
    // ============= SALES TAB FUNCTIONS =============
    async function refreshSalesDisplay() {
        const sales = loadData(STORAGE_KEYS.SALES).filter(s => s.date === currentDate && s.salesman === currentSalesman);
        const tbody = document.getElementById('sales-table-body');
        if (!tbody) return;
        tbody.innerHTML = '';
        let totalSales = 0;
        sales.forEach(sale => {
            const amount = sale.price * sale.qty;
            totalSales += amount;
            const row = tbody.insertRow();
            row.insertCell(0).textContent = sale.customer;
            row.insertCell(1).textContent = sale.product;
            row.insertCell(2).textContent = sale.qty;
            row.insertCell(3).textContent = `₱${amount.toFixed(2)}`;
            const editBtn = document.createElement('button');
            editBtn.textContent = '✏️ Edit';
            editBtn.style.padding = '4px 8px';
            editBtn.style.fontSize = '11px';
            editBtn.onclick = () => loadSaleForEdit(sale.id);
            const cell = row.insertCell(4);
            cell.appendChild(editBtn);
        });
        if(document.getElementById('sales-total-display')) {
            document.getElementById('sales-total-display').innerHTML = `<strong>Total Sales: ₱${totalSales.toFixed(2)}</strong>`;
        }
    }
    
    async function loadSaleForEdit(id) {
        const sales = loadData(STORAGE_KEYS.SALES).filter(s => s.date === currentDate && s.salesman === currentSalesman);
        const sale = sales.find(s => s.id === id);
        if (sale) {
            document.getElementById('sale-market').value = sale.market || Object.keys(loadMarketsCustomers())[0];
            await updateCustomerList();
            document.getElementById('sale-customer').value = sale.customer;
            document.getElementById('sale-product').value = sale.product;
            document.getElementById('sale-price').value = sale.price;
            document.getElementById('sale-qty').value = sale.qty;
            editingSaleId = id;
            document.getElementById('save-sale-btn').innerHTML = '✏️ UPDATE SALE';
        }
    }
    
    async function addOrUpdateSale() {
        const customer = document.getElementById('sale-customer').value;
        const market = document.getElementById('sale-market').value;
        const product = document.getElementById('sale-product').value;
        const price = parseFloat(document.getElementById('sale-price').value);
        const qty = parseInt(document.getElementById('sale-qty').value);
        
        if (!customer || customer === 'Select Customer') {
            showMessage('Warning', 'Please select a customer');
            return;
        }
        if (qty <= 0 || price <= 0) {
            showMessage('Warning', 'Please enter valid quantity and price');
            return;
        }
        
        const sales = loadData(STORAGE_KEYS.SALES);
        
        if (editingSaleId === -1) {
            const newSale = {
                id: Date.now(),
                date: currentDate,
                salesman: currentSalesman,
                market: market,
                customer: customer,
                product: product,
                price: price,
                qty: qty,
                timestamp: getTimestamp()
            };
            sales.push(newSale);
            saveData(STORAGE_KEYS.SALES, sales);
            showMessage('Success', 'Sale saved successfully!');
        } else {
            const index = sales.findIndex(s => s.id === editingSaleId);
            if (index !== -1) {
                sales[index] = { ...sales[index], market, customer, product, price, qty };
                saveData(STORAGE_KEYS.SALES, sales);
            }
            editingSaleId = -1;
            document.getElementById('save-sale-btn').innerHTML = '💾 SAVE SALE';
            showMessage('Success', 'Sale updated successfully!');
        }
        
        document.getElementById('sale-customer').value = 'Select Customer';
        document.getElementById('sale-qty').value = '0';
        document.getElementById('sale-price').value = '38';
        
        await refreshSalesDisplay();
        await updateSummaryBar();
    }
    
    async function updateCustomerList() {
        const market = document.getElementById('sale-market').value;
        const customers = getCustomers(market);
        const customerSelect = document.getElementById('sale-customer');
        customerSelect.innerHTML = '<option>Select Customer</option>';
        customers.forEach(c => {
            const option = document.createElement('option');
            option.value = c;
            option.textContent = c;
            customerSelect.appendChild(option);
        });
    }
    
    function updateProductPrice() {
        const product = document.getElementById('sale-product').value;
        const price = productPrices[product] || 0;
        document.getElementById('sale-price').value = price;
    }

    const incurredItems = ['Salt', 'F. color', 'Poly bags', 'Sodas', 'C.Starch', 'Firewood', 'Snacks', 'Others'];
    
    function updateExpenseItems() {
        const type = document.getElementById('expense-type').value;
        const itemSelect = document.getElementById('expense-item');
        const items = type === 'Delivery' ? deliveryItems : incurredItems;
        itemSelect.innerHTML = '';
        items.forEach(item => {
            const option = document.createElement('option');
            option.value = item;
            option.textContent = item;
            itemSelect.appendChild(option);
        });
    }
    
    async function addExpense() {
        const type = document.getElementById('expense-type').value;
        const item = document.getElementById('expense-item').value;

    // ============= CASH COLLECTION TAB FUNCTIONS =============
    const denominations = [1000, 500, 200, 100, 50, 20, 10, 5, 1];
    
    async function updateCollectionTotal() {
        let total = 0;
        denominations.forEach(denom => {
            const input = document.getElementById(`denom-${denom}`);
            if (input) {
                const count = parseInt(input.value) || 0;
                total += count * denom;
            }
        });
        if(document.getElementById('total-collected')) document.getElementById('total-collected').innerHTML = `💰 TOTAL COLLECTED: ₱${total.toFixed(2)}`;
        
        const sales = loadData(STORAGE_KEYS.SALES).filter(s => s.date === currentDate && s.salesman === currentSalesman);
        const expenses = loadData(STORAGE_KEYS.EXPENSES).filter(e => e.date === currentDate && e.salesman === currentSalesman);
        const spoilage = loadData(STORAGE_KEYS.SPOILAGE).filter(s => s.date === currentDate && s.salesman === currentSalesman);
        
        const totalSales = sales.reduce((sum, s) => sum + (s.price * s.qty), 0);
        const totalExpenses = expenses.reduce((sum, e) => sum + e.amount, 0);
        const totalSpoilageLoss = spoilage.reduce((sum, s) => sum + s.total_loss, 0);
        
        const expectedCash = totalSales - totalExpenses - totalSpoilageLoss;
        const difference = total - expectedCash;
        
        if(document.getElementById('expected-cash')) document.getElementById('expected-cash').innerHTML = `📊 Expected Cash: ₱${expectedCash.toFixed(2)}`;
        if(document.getElementById('spoilage-deduction')) document.getElementById('spoilage-deduction').innerHTML = `📉 Less Spoilage: ₱${totalSpoilageLoss.toFixed(2)}`;
        
        const diffElem = document.getElementById('difference');
        if (diffElem) {
            diffElem.innerHTML = `Difference: ₱${difference.toFixed(2)}`;
            diffElem.className = difference >= 0 ? 'positive' : 'negative';
        }
        
        const statusElem = document.getElementById('collection-status');
        if (statusElem) {
            if (difference > 0) {
                statusElem.innerHTML = `✅ OVER by ₱${difference.toFixed(2)}`;
                statusElem.className = 'positive';
            } else if (difference < 0) {
                statusElem.innerHTML = `⚠️ SHORT by ₱${Math.abs(difference).toFixed(2)}`;
                statusElem.className = 'negative';
            } else {
                statusElem.innerHTML = '✅ EXACT MATCH';
                statusElem.className = 'positive';
            }
        }
    }
    
    async function saveCollectionHandler() {
        const collectionData = {};
        let total = 0;
        denominations.forEach(denom => {
            const count = parseInt(document.getElementById(`denom-${denom}`).value) || 0;
            if (count > 0) collectionData[denom] = count;
            total += count * denom;
        });
        
        if (total === 0) {
            showMessage('Warning', 'No collection data to save');
            return;
        }
        
        const collections = loadData(STORAGE_KEYS.COLLECTIONS);
        const existingIndex = collections.findIndex(c => c.date === currentDate && c.salesman === currentSalesman);
        
        if (existingIndex !== -1) {
            collections[existingIndex] = {
                ...collections[existingIndex],
                denominations: collectionData,
                total_amount: total,
                timestamp: getTimestamp()
            };
            saveData(STORAGE_KEYS.COLLECTIONS, collections);
            showMessage('Success', `Collection UPDATED: ₱${total.toFixed(2)}`);
        } else {
            const newCollection = {
                id: Date.now(),
                date: currentDate,
                salesman: currentSalesman,
                denominations: collectionData,
                total_amount: total,
                timestamp: getTimestamp()
            };
            collections.push(newCollection);
            saveData(STORAGE_KEYS.COLLECTIONS, collections);
            showMessage('Success', `Collection SAVED: ₱${total.toFixed(2)}`);
        }
        
        resetCollection();
        await refreshCollectionsDisplay();
        await updateSummaryBar();
    }

    async function processPayment(receivableId, maxAmount) {
        const amount = parseFloat(document.getElementById('payment-amount').value);
        if (isNaN(amount) || amount <= 0) {
            showMessage('Warning', 'Please specify a valid financial ledger numeric payment value');
            return;
        }
        
        const paymentAmount = Math.min(amount, maxAmount);
        const receivables = loadData(STORAGE_KEYS.RECEIVABLES);
        const index = receivables.findIndex(r => r.id === receivableId);
        
        if (index !== -1) {
            const r = receivables[index];
            r.amount_paid += paymentAmount;
            r.balance = r.amount_owed - r.amount_paid;
            r.status = r.balance <= 0 ? 'PAID' : 'PARTIAL';
            saveData(STORAGE_KEYS.RECEIVABLES, receivables);
            
            const payments = loadData(STORAGE_KEYS.PAYMENTS);
            payments.push({
                id: Date.now(),
                date: currentDate,
                salesman: currentSalesman,
                name: r.name,
                receivable_id: receivableId,
                amount: paymentAmount,
                timestamp: getTimestamp()
            });
            saveData(STORAGE_KEYS.PAYMENTS, payments);
            
            document.querySelector('.popup-overlay')?.remove();
            await refreshReceivablesDisplay();
            await updateSummaryBar();
            showMessage('Success', `Payment of ₱${paymentAmount.toFixed(2)} posted successfully!`);
        }
    }

    function importDatabase(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const parsed = JSON.parse(e.target.result);
                Object.keys(parsed).forEach(k => { localStorage.setItem(k, JSON.stringify(parsed[k])); });
                showMessage('Import Complete', 'System storage runtime indices state successfully synchronized from JSON layout payload');
                refreshAll();
            } catch(err) {
                showMessage('Error', 'Invalid data model architecture schema format constraints detected', true);
            }
        };
        reader.readAsText(file);
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        const targetPane = document.getElementById(tabId);
        if (targetPane) targetPane.classList.add('active');
        
        const targetBtn = document.querySelector(`button[onclick="switchTab('${tabId}')"]`);
        if (targetBtn) targetBtn.classList.add('active');
        
        if (tabId === 'tab-sales') refreshSalesDisplay();
        else if (tabId === 'tab-expenses') refreshExpensesDisplay();
        else if (tabId === 'tab-spoilage') refreshSpoilageDisplay();
        else if (tabId === 'tab-collection') { updateCollectionTotal(); refreshCollectionsDisplay(); }
        else if (tabId === 'tab-receivables') { updateReceivableNameOptions(); refreshReceivablesDisplay(); }
        else if (tabId === 'tab-reports') generateReport();
        else if (tabId === 'tab-management') viewDatabaseStats();

    async function updateSummaryBar() {
        const sales = loadData(STORAGE_KEYS.SALES).filter(s => s.date === currentDate && s.salesman === currentSalesman);
        const expenses = loadData(STORAGE_KEYS.EXPENSES).filter(e => e.date === currentDate && e.salesman === currentSalesman);
        const spoilage = loadData(STORAGE_KEYS.SPOILAGE).filter(s => s.date === currentDate && s.salesman === currentSalesman);
        
        const tSales = sales.reduce((sum, s) => sum + (s.price * s.qty), 0);
        const tExpenses = expenses.reduce((sum, e) => sum + e.amount, 0);
        const tLoss = spoilage.reduce((sum, s) => sum + s.total_loss, 0);
        const netCash = tSales - tExpenses - tLoss;
        
        const sumBar = document.getElementById('global-app-summary-bar');
        if (sumBar) {
            sumBar.innerHTML = `
                <div class="summary-text">
                    Profile: <span style="color:#0ff">${currentSalesman}</span> &nbsp;|&nbsp; 
                    Sales: <span style="color:#ff0">₱${tSales.toFixed(2)}</span> &nbsp;|&nbsp; 
                    Expenses: <span style="color:#ff6b6b">₱${tExpenses.toFixed(2)}</span> &nbsp;|&nbsp; 
                    Loss: <span style="color:#f39c12">₱${tLoss.toFixed(2)}</span> &nbsp;|&nbsp; 
                    Expected Cash Flow: <span style="color:#00ff88">₱${netCash.toFixed(2)}</span>
                </div>
                <div style="font-size:10px; color:#aaa;">System Secure Cloud Access Engine Engine (v2.4)</div>`;
        }
    }

    function handleLogin() {
        const u = document.getElementById('login-username').value.trim();
        const p = document.getElementById('login-password').value;
        
        const userPool = loadData(STORAGE_KEYS.USERS);
        let matchedUser = null;
        
        if (defaultUsers[u] && defaultUsers[u].password === btoa(p)) {
            matchedUser = defaultUsers[u];
        } else {
            const runtimeFind = userPool.find(item => item.username === u && item.password === btoa(p));
            if (runtimeFind) matchedUser = { role: runtimeFind.role, name: runtimeFind.username };
        }
        
        if (matchedUser) {
            currentUser = matchedUser.name;
            userRole = matchedUser.role;
            currentSalesman = userRole === 'admin' ? 'Jay' : currentUser;
            
            document.getElementById('login-overlay-container').style.display = 'none';
            renderAppLayout();
            initializeMarketSelectors();
            updateAllDateDisplays();
            refreshAll();
            showMessage('Welcome Back', `Authenticated user context session signed onto profile: ${currentUser}`);
        } else {
            alert('Invalid verification criteria matching patterns');
        }
    }
